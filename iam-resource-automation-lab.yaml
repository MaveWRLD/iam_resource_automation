AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Resource Automation Lab

Resources:

  IamOtpSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: iam-lab-otp-secret
      Description: One Time Password for IAM users in lab
      GenerateSecretString:
        SecretStringTemplate: '{"purpose": "iam-lab"}'
        GenerateStringKey: password
        PasswordLength: 12
        ExcludeCharacters: '"@/\'''
        RequireEachIncludedType: true

  ChangePasswordPolicy:
    Type: AWS::IAM::ManagedPolicy
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ManagedPolicyName: allow-change-own-password
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowChangeOwnPassword
            Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetAccountPasswordPolicy
            Resource: '*'

  S3UserGroup:
    Type: AWS::IAM::Group
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      GroupName: s3-list-buckets-group
      ManagedPolicyArns:
        - !Ref ChangePasswordPolicy
      Policies:
        - PolicyName: S3ListBucketsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowListAllBuckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                Resource: '*'

  EC2UserGroup:
    Type: AWS::IAM::Group
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      GroupName: ec2-list-create-group
      ManagedPolicyArns:
        - !Ref ChangePasswordPolicy
      Policies:
        - PolicyName: EC2ListCreatePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowListEC2Instances
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeInstanceTypes
                Resource: '*'
              - Sid: AllowCreateEC2Instances
                Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:DescribeImages
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeKeyPairs
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeVolumes
                  - ec2:DescribeSecurityGroupRules
                  - ec2:CreateNetworkInterface
                  - ec2:CreateSecurityGroup
                  - ec2:CreateVolume
                  - ec2:AttachVolume
                  - ec2:CreateTags
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                Resource: '*'

  EC2ListOnlyBoundary:
    Type: AWS::IAM::ManagedPolicy
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ManagedPolicyName: ec2-list-only-boundary
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowListOnly
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:DescribeInstanceTypes
            Resource: '*'
          - Sid: AllowChangePassword
            Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetAccountPasswordPolicy
            Resource: '*'

  EC2User1:
    Type: AWS::IAM::User
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      UserName: ec2-user1
      Groups:
        - !Ref EC2UserGroup
      LoginProfile:
        Password: !Sub
          - '{{resolve:secretsmanager:${SecretId}:SecretString:password}}'
          - SecretId: !Ref IamOtpSecret
        PasswordResetRequired: true

  EC2User2:
    Type: AWS::IAM::User
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      UserName: ec2-user2
      Groups:
        - !Ref EC2UserGroup
      PermissionsBoundary: !Ref EC2ListOnlyBoundary
      LoginProfile:
        Password: !Sub
          - '{{resolve:secretsmanager:${SecretId}:SecretString:password}}'
          - SecretId: !Ref IamOtpSecret
        PasswordResetRequired: true

  # S3User:
  #   Type: AWS::IAM::User
  #   DeletionPolicy: Delete
  #   UpdateReplacePolicy: Delete
  #   Properties:
  #     UserName: s3-user
  #     Groups:
  #       - !Ref S3UserGroup
  #     LoginProfile:
  #       Password: !Sub
  #         - '{{resolve:secretsmanager:${SecretId}:SecretString:password}}'
  #         - SecretId: !Ref IamOtpSecret
  #       PasswordResetRequired: true

Outputs:
  IamOtpSecretArn:
    Description: ARN of the OTP secret
    Value: !Ref IamOtpSecret
    Export:
      Name: !Sub "${AWS::StackName}-OtpSecretArn"

  S3UserGroupName:
    Description: Name of the S3 user group
    Value: !Ref S3UserGroup
    Export:
      Name: !Sub "${AWS::StackName}-S3UserGroupName"

  EC2UserGroupName:
    Description: Name of the EC2 user group
    Value: !Ref EC2UserGroup
    Export:
      Name: !Sub "${AWS::StackName}-EC2UserGroupName"

  EC2User1Name:
    Description: EC2 User 1 username
    Value: !Ref EC2User1
    Export:
      Name: !Sub "${AWS::StackName}-EC2User1Name"

  EC2User2Name:
    Description: EC2 User 2 username
    Value: !Ref EC2User2
    Export:
      Name: !Sub "${AWS::StackName}-EC2User2Name"

  S3UserName:
    Description: S3 User username
    Value: !Ref S3User
    Export:
      Name: !Sub "${AWS::StackName}-S3UserName"